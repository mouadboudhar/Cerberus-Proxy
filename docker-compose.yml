services:
  proxy:
    build: .
    container_name: cerberus-proxy
    ports:
      - "8000:8000"
    volumes:
      - cerberus-data:/app/data
    environment:
      - CERBERUS_DB_PATH=/app/data/cerberus.db
      - CERBERUS_UPSTREAM_URL=${CERBERUS_UPSTREAM_URL:-https://api.openai.com}
      - CERBERUS_PROVIDER=${CERBERUS_PROVIDER:-openai}
      - CERBERUS_DEFAULT_RPM=${CERBERUS_DEFAULT_RPM:-60}
      - CERBERUS_DEFAULT_RPH=${CERBERUS_DEFAULT_RPH:-1000}
      - CERBERUS_DEFAULT_RPD=${CERBERUS_DEFAULT_RPD:-10000}
      - CERBERUS_OUTPUT_GUARD_ACTION=${CERBERUS_OUTPUT_GUARD_ACTION:-redact}
      - CERBERUS_DASHBOARD_TOKEN=${CERBERUS_DASHBOARD_TOKEN:-change-me}
      - CERBERUS_TRANSLATE_TIMEOUT=${CERBERUS_TRANSLATE_TIMEOUT:-1.0}
      - CERBERUS_DEFAULT_CLEARANCE=${CERBERUS_DEFAULT_CLEARANCE:-INTERNAL}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: cerberus-dashboard
    ports:
      - "5173:80"
    depends_on:
      proxy:
        condition: service_healthy
    restart: unless-stopped

volumes:
  cerberus-data:
    driver: local
